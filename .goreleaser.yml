version: 2

project_name: vmup

builds:
  - binary: vmup
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}

# macOS code signing + notarization is deferred until the Developer ID
# credentials are available. To turn it on, add a quill `binary_signs` block
# here and the QUILL_* secrets — see RELEASING.md for the full recipe. Until
# then, releases ship unsigned.

archives:
  - formats:
      - tar.gz
    name_template: "vmup_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
