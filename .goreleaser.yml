version: 2

project_name: vmup

builds:
  - binary: vmup
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}

# Sign and notarize the macOS binaries with quill (runs on Linux). This is
# OPTIONAL: signing only runs when the QUILL_SIGN_P12 secret is present, so
# releases succeed unsigned until the Developer ID credentials are configured.
# Adding the QUILL_* secrets (see RELEASING.md) turns signing on with no other
# change. Snapshot builds sign ad-hoc, so `goreleaser release --snapshot` works
# without credentials. quill inherits the QUILL_* env vars from the environment.
binary_signs:
  - cmd: quill
    args:
      - "sign-and-notarize"
      - "${artifact}"
      - "--dry-run={{ .IsSnapshot }}"
      - "--ad-hoc={{ .IsSnapshot }}"
      - "-vv"
    if: '{{ and (eq .Os "darwin") (or .IsSnapshot (ne (index .Env "QUILL_SIGN_P12") "")) }}'
    output: true

archives:
  - formats:
      - tar.gz
    name_template: "vmup_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
